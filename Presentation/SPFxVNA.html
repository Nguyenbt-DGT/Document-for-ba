    /* ─── BpCard — white, expand/collapse, hover lift ─────── */
    function BpCard({ color, title, tag, subtitle, items, children }) {
      const [expanded, setExpanded] = useState(true);
      const [hovered, setHovered] = useState(false);
      const r = rgb(color);
      return (
        <div
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{
            background: "#FFFFFF",
            border: "1px solid #E5E7EB",
            borderLeft: `3px solid ${color}`,
            borderRadius: 8,
            padding: "9px 10px 9px 11px",
            marginBottom: 6,
            boxShadow: hovered ? "0 6px 20px rgba(0,0,0,0.10)" : "0 1px 3px rgba(0,0,0,0.07)",
            transform: hovered ? "translateY(-2px)" : "translateY(0)",
            transition: "box-shadow 0.2s, transform 0.2s",
            animation: "fadeInUp 0.28s ease",
          }}
        >
          {/* header row: tag + title + toggle */}
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:6 }}>
            <div style={{ flex:1 }}>
              {tag && (
                <div style={{ display:"inline-block", background:`rgba(${r},0.08)`, border:`1px solid rgba(${r},0.2)`, borderRadius:3, padding:"1.5px 6px", marginBottom:4 }}>
                  <span style={{ fontSize:7.5, color, fontWeight:700, letterSpacing:0.5 }}>{tag}</span>
                </div>
              )}
              <div style={{ fontSize:10.5, fontWeight:700, color:"#111827", marginBottom:(subtitle||items)&&expanded?4:0, lineHeight:1.3 }}>{title}</div>
            </div>
            <button
              onClick={() => setExpanded(e => !e)}
              style={{
                width:18, height:18, borderRadius:4, border:`1px solid rgba(${r},0.25)`,
                background:`rgba(${r},0.07)`, cursor:"pointer", display:"flex", alignItems:"center",
                justifyContent:"center", flexShrink:0, color, fontSize:14, fontWeight:700,
                lineHeight:1, padding:0, marginTop:1,
              }}
              title={expanded ? "Collapse" : "Expand"}
            >{expanded ? "−" : "+"}</button>
          </div>
          {expanded && subtitle && <div style={{ fontSize:8.5, color:"#6B7280", marginBottom:5, lineHeight:1.5, fontStyle:"italic" }}>{subtitle}</div>}
          {expanded && items && items.map((item,i)=>(
            <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:5, marginBottom:3 }}>
              <div style={{ width:4, height:4, borderRadius:"50%", background:color, flexShrink:0, marginTop:5 }} />
              <span style={{ fontSize:8.5, color:"#6B7280", lineHeight:1.45 }}>{item}</span>
            </div>
          ))}
          {expanded && children}
        </div>
      );
    }

    /* ─── AnimatedKpi count-up ────────────────────────────── */
    function AnimatedKpi({ raw }) {
      const [display, setDisplay] = useState(() => {
        const m = raw.match(/^([^0-9]*)([0-9,]+\.?[0-9]*)(.*)$/);
        return m ? "0" + m[3] : raw;
      });
      const rafRef = useRef(null);

      useEffect(() => {
        const m = raw.match(/^([^0-9]*)([0-9,]+\.?[0-9]*)(.*)$/);
        if (!m) { setDisplay(raw); return; }
        const numStr = m[2];
        const suffix = m[3];
        const num = parseFloat(numStr.replace(/,/g, ""));
        const hasDecimal = numStr.includes(".");
        const hasComma   = numStr.includes(",") && !hasDecimal;
        const startTime  = performance.now();
        const duration   = 1200;

        function tick(now) {
          const progress = Math.min((now - startTime) / duration, 1);
          const eased    = 1 - Math.pow(1 - progress, 3); // ease-out cubic
          const current  = num * eased;
          let formatted;
          if (hasDecimal)     formatted = current.toFixed(1);
          else if (hasComma)  formatted = Math.round(current).toLocaleString();
          else                formatted = Math.round(current).toString();
          setDisplay(formatted + suffix);
          if (progress < 1) rafRef.current = requestAnimationFrame(tick);
        }

        rafRef.current = requestAnimationFrame(tick);
        return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
      }, [raw]);

      return <span>{display}</span>;
    }

                <div>
                  <div style={{ fontSize:10, fontWeight:700, color:"#EE4D2D" }}>ShopeeFood</div>
                  <div style={{ fontSize:8, color:"#9CA3AF" }}>Food Delivery Platform</div>
                </div>
              </div>
              <div style={{ marginLeft:"auto", display:"flex", gap:6, flexWrap:"wrap" }}>
                {["UX Service Blueprint","Product Workflow v1.0","Journey Map · 8 Steps"].map((t,i)=>(
                  <div key={i} style={{ background:"#F3F4F6", border:"1px solid #E5E7EB", borderRadius:5, padding:"2.5px 8px" }}>
                    <span style={{ fontSize:8, color:"#6B7280" }}>{t}</span>
                  </div>
                ))}
              </div>
            </div>
            <h1 style={{ fontSize:19, fontWeight:800, color:"#111827", margin:"0 0 2px", letterSpacing:"-0.5px", lineHeight:1.3 }}>
              Vietnam Airlines × ShopeeFood
              <span style={{ display:"block", fontSize:13, fontWeight:400, color:"#6B7280", letterSpacing:0, marginTop:2 }}>
                Travel Journey &amp; Voucher Recommendation Experience — End-to-End Service Blueprint
              </span>
            </h1>
            <div style={{ display:"flex", gap:7, marginTop:11, flexWrap:"wrap", alignItems:"center" }}>
              <span style={{ fontSize:7.5, color:"#9CA3AF", fontWeight:700, letterSpacing:0.5 }}>ACTORS:</span>
              {LANES.map(l=>(
                <div key={l.key} style={{ display:"flex", alignItems:"center", gap:5, background:`rgba(${rgb(l.color)},0.07)`, border:`1px solid rgba(${rgb(l.color)},0.22)`, borderRadius:16, padding:"2px 8px 2px 5px" }}>
                  <div style={{ width:7, height:7, borderRadius:"50%", background:l.color }} />
                  <span style={{ fontSize:7.5, color:l.color, fontWeight:600 }}>{l.lines[0]}</span>
                </div>
              ))}
              <div style={{ width:1, height:14, background:"#E5E7EB", margin:"0 2px" }} />
              {[{icon:"&#9826;",label:"Decision Node",color:"#6B7280"},{icon:"&#10022;",label:"Key Moment",color:C.vna},{icon:"&#9733;",label:"Conversion",color:"#EE4D2D"}].map((t,i)=>(
                <div key={i} style={{ display:"flex", alignItems:"center", gap:4, background:"#F9FAFB", border:"1px solid #E5E7EB", borderRadius:16, padding:"2px 8px 2px 5px" }}>
                  <span style={{ fontSize:9, color:t.color }} dangerouslySetInnerHTML={{__html:t.icon}} />
                  <span style={{ fontSize:7.5, color:"#6B7280", fontWeight:600 }}>{t.label}</span>
                </div>
              ))}
              {/* keyboard hint */}
              <div style={{ marginLeft:"auto", fontSize:7.5, color:"#CBD5E1", display:"flex", alignItems:"center", gap:4 }}>
                <kbd style={{ background:"#F3F4F6", border:"1px solid #E5E7EB", borderRadius:3, padding:"1px 4px", fontSize:7, color:"#9CA3AF" }}>←→</kbd>
                <span>navigate</span>
                <kbd style={{ background:"#F3F4F6", border:"1px solid #E5E7EB", borderRadius:3, padding:"1px 4px", fontSize:7, color:"#9CA3AF" }}>Esc</kbd>
                <span>clear</span>
              </div>
            </div>
          </div>

          {/* ── GRID ── */}
          <div style={{ overflowX:"auto", background:"#FFFFFF" }}>
            <div style={{ minWidth:LABEL_W+CELL_W*8+56, padding:"0 28px 80px" }}>

              {/* Phase bars */}
              <div style={{ display:"flex", marginLeft:LABEL_W, paddingTop:14 }}>
                {PHASES.map((p,i)=>{
                  const pR = rgb(p.color);
                  return (
                    <div
                      key={i}
                      onClick={() => handlePhaseClick(i)}
                      style={{
                        width: CELL_W * p.count,
                        borderTop: `3px solid ${p.color}`,
                        paddingTop:5, paddingLeft:10, paddingBottom:6,
                        cursor:"pointer",
                        background: activePhase===i ? `rgba(${pR},0.07)` : "transparent",
                        borderLeft: i>0 ? "1px solid #F3F4F6" : "none",
                        transition:"background 0.18s",
                        userSelect:"none",
                        borderRadius: activePhase===i ? "0 0 4px 4px" : 0,
                      }}
                    >
                      <span style={{ fontSize:7.5, color:p.color, fontWeight: activePhase===i ? 800 : 700, letterSpacing:0.8 }}>{p.label}</span>
                      {activePhase===i && <span style={{ fontSize:7, color:p.color, marginLeft:5, opacity:0.7 }}>▼</span>}
                    </div>
                  );
                })}
              </div>

              {/* Step header row */}
              <div style={{ display:"flex", marginBottom:2, background:"#FAFAFA", borderBottom:"1px solid #F3F4F6" }}>
                <div style={{ width:LABEL_W, flexShrink:0, padding:"6px 10px", display:"flex", alignItems:"center" }}>
                  <span style={{ fontSize:8, color:"#9CA3AF", fontWeight:700, letterSpacing:0.5 }}>SWIMLANE</span>
                </div>
                {STEPS.map((s,i)=>(
                  <div
                    key={i}
                    onClick={() => handleStepClick(i)}
                    onMouseEnter={() => setHoveredStep(i)}
                    onMouseLeave={() => setHoveredStep(null)}
                    style={{
                      width:CELL_W, flexShrink:0, padding:"7px 10px",
                      borderLeft:"1px solid #F3F4F6",
                      borderTop: activeStep===i ? "2px solid #EE4D2D" : "2px solid transparent",
                      background: activeStep===i
                        ? "rgba(238,77,45,0.06)"
                        : hoveredStep===i ? "#F9FAFB" : "transparent",
                      cursor:"pointer",
                      transition:"background 0.15s",
                      opacity: activeStep!==null && activeStep!==i ? 0.5 : 1,
                      userSelect:"none",
                    }}
                  >
                    <div style={{ fontSize:7.5, color: activeStep===i ? "#EE4D2D" : "#9CA3AF", fontWeight:700, marginBottom:1.5 }}>STEP {i+1}</div>
                    <div style={{ fontSize:9.5, color: activeStep===i ? "#111827" : "#374151", fontWeight:600 }}>{s}</div>
                  </div>
                ))}
              </div>

              {/* Lane rows */}
              {LANES.map((lane)=>(
                <div
                  key={lane.key}
                  style={{
                    display:"flex",
                    borderTop:`1px solid rgba(${rgb(lane.color)},0.12)`,
                    opacity: activeLane!==null && activeLane!==lane.key ? 0.35 : 1,
                    transition:"opacity 0.22s",
                  }}
                >
                  {/* Lane label */}
                  <div
                    onClick={() => handleLaneClick(lane.key)}
                    style={{
                      width:LABEL_W, flexShrink:0, padding:"14px 12px",
                      background: activeLane===lane.key ? `rgba(${rgb(lane.color)},0.09)` : lane.bg,
                      borderRight:`2px solid rgba(${rgb(lane.color)},0.22)`,
                      display:"flex", flexDirection:"column", justifyContent:"center", gap:5,
                      cursor:"pointer", transition:"background 0.15s", userSelect:"none",
                    }}
                  >
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ width:32, height:32, borderRadius:"50%", background:`rgba(${rgb(lane.color)},0.09)`, border:`2px solid rgba(${rgb(lane.color)},0.3)`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:15 }}>{lane.icon}</div>
                      <div>
                        {lane.lines.map((line,li)=>(
                          <div key={li} style={{ fontSize:li===0?10.5:9, fontWeight:li===0?700:400, color:li===0?lane.color:"#9CA3AF", lineHeight:1.35 }}>{line}</div>
                        ))}
                      </div>
                    </div>
                    {activeLane===lane.key && (
                      <div style={{ fontSize:7, color:lane.color, opacity:0.7, marginLeft:40 }}>focused ▶</div>
                    )}
                  </div>

                  {/* Step cells */}
                  {Array.from({length:8},(_,si)=>{
                    const active = colIsActive(si);
                    const hovered = hoveredStep===si;
                    const rStr = rgb(lane.color);
                    let bg;
                    if (active)        bg = "rgba(238,77,45,0.04)";
                    else if (hovered)  bg = `rgba(${rStr},0.04)`;
                    else               bg = si%2===0 ? `rgba(${rStr},0.015)` : lane.bg;
                    return (
                      <div
                        key={si}
                        style={{
                          width:CELL_W, flexShrink:0, padding:"12px 8px",
                          borderLeft:"1px solid #F3F4F6",
                          borderTop: active ? "1.5px solid rgba(238,77,45,0.25)" : "1.5px solid transparent",
                          borderBottom: active ? "1.5px solid rgba(238,77,45,0.25)" : "1.5px solid transparent",
                          background: bg,
                          transition:"background 0.15s",
                          minHeight:100,
                        }}
                      >
                        <CellContent lane={lane.key} step={si+1} />
                      </div>
                    );
                  })}
                </div>
              ))}

              {/* KPI section */}
              <div style={{ marginTop:24, borderTop:"1px solid #E5E7EB", paddingTop:18 }}>
                <div style={{ marginLeft:LABEL_W, paddingLeft:10 }}>
                  <div style={{ fontSize:8.5, color:"#9CA3AF", fontWeight:700, letterSpacing:0.8, marginBottom:12 }}>&#128202; KPI MEASUREMENT LAYER — CAMPAIGN PERFORMANCE</div>
                  <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                    {[
                      {label:"Voucher Open Rate",  value:"68%",   sub:"+12% vs baseline",    color:"#818CF8"},
                      {label:"Redemption Rate",    value:"34%",   sub:"+8% vs avg",           color:"#0891B2"},
                      {label:"Restaurant CTR",     value:"51%",   sub:"+15% vs avg",          color:C.vna    },
                      {label:"Orders Generated",   value:"2,847", sub:"in pilot period",      color:C.sfbe   },
                      {label:"Revenue (GMV)",      value:"142M",  sub:"campaign attributed",  color:C.sfapp  },
                      {label:"API Uptime",         value:"99.2%", sub:"LotusSmile sync",      color:"#059669"},
                      {label:"Avg. Order Value",   value:"78K",   sub:"+22% with voucher",    color:"#7C3AED"},
                      {label:"Return Order Rate",  value:"61%",   sub:"repeat after trip",    color:"#0284C7"},
                    ].map((k,i)=>(
                      <KpiCard key={i} label={k.label} value={k.value} sub={k.sub} color={k.color} />
                    ))}
                  </div>
                </div>
              </div>

              {/* Footer meta */}
              <div style={{ marginTop:24, marginLeft:LABEL_W, paddingLeft:10 }}>
                <div style={{ display:"flex", gap:20, flexWrap:"wrap", borderTop:"1px solid #E5E7EB", paddingTop:14 }}>
                  {["Diagram Type: UX Service Blueprint + Product Workflow + Journey Map","Version: 1.0 · July 2026","Stakeholders: Product · Design · Engineering · Partnership","Scope: SGN to DAD · 4-day trip · Pilot campaign"].map((t,i)=>(
                    <span key={i} style={{ fontSize:8, color:"#CBD5E1" }}>{t}</span>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* ── STEP NAVIGATOR (floating pill) ── */}
          <div style={{
            position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)",
            zIndex:100, background:"#FFFFFF", border:"1px solid #E5E7EB",
            borderRadius:999, padding:"8px 18px",
            boxShadow:"0 4px 24px rgba(0,0,0,0.13)",
            display:"flex", alignItems:"center", gap:12, userSelect:"none", whiteSpace:"nowrap",
          }}>
            {activeStep !== null ? (
              <>
                <button
                  onClick={() => setActiveStep(s => Math.max(s-1, 0))}
                  disabled={activeStep===0}
                  style={{
                    background: activeStep===0 ? "#F3F4F6" : "#EE4D2D",
                    color: activeStep===0 ? "#9CA3AF" : "#FFF",
                    border:"none", borderRadius:999, padding:"4px 12px",
                    cursor: activeStep===0 ? "not-allowed" : "pointer",
                    fontSize:9, fontWeight:700, transition:"background 0.15s",
                  }}
                >&#8592; Prev</button>
                <div style={{ textAlign:"center", minWidth:120 }}>
                  <div style={{ fontSize:9, color:"#111827", fontWeight:700 }}>Step {activeStep+1}/{STEPS.length}</div>
                  <div style={{ fontSize:7.5, color:"#6B7280", marginTop:1 }}>{STEPS[activeStep]}</div>
                </div>
                <button
                  onClick={() => setActiveStep(s => Math.min(s+1, STEPS.length-1))}
                  disabled={activeStep===STEPS.length-1}
                  style={{
                    background: activeStep===STEPS.length-1 ? "#F3F4F6" : "#EE4D2D",
                    color: activeStep===STEPS.length-1 ? "#9CA3AF" : "#FFF",
                    border:"none", borderRadius:999, padding:"4px 12px",
                    cursor: activeStep===STEPS.length-1 ? "not-allowed" : "pointer",
                    fontSize:9, fontWeight:700, transition:"background 0.15s",
                  }}
                >Next &#8594;</button>
                <button
                  onClick={() => { setActiveStep(null); setActiveLane(null); setActivePhase(null); }}
                  style={{ background:"none", border:"1px solid #E5E7EB", borderRadius:999, padding:"3px 8px", cursor:"pointer", fontSize:8, color:"#9CA3AF" }}
                >&#10005;</button>
              </>
            ) : (
              <span style={{ fontSize:8.5, color:"#9CA3AF", padding:"1px 4px" }}>
                &#128161; Click a column to focus &nbsp;·&nbsp; &#8592; &#8594; navigate &nbsp;·&nbsp; Esc to clear
              </span>
            )}
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
